<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">

     <!--/*  font awesome per il bottone vicino al titolo */-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title th:text="${title}">Title</title>
</head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-12">  
                    <h1 class="text-center"> Tutti i Post</h1>
                    <a th:href="@{/posts/create}" class="btn btn-primary m-2">
                        <i class="fa-solid fa-plus"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row">
                <div class="col-12">
                    <table class="table table-striped table-responsive-lg">
                        <thead>
                            <tr>
                                <th>name</th>
                                <th>surname</th>
                                <th>title</th>
                                <th>body</th>
                                
                            </tr>
                        </thead>
                     <tbody>
                        <tr th:each="post : ${posts}">
                            <td th:text="${post.authorName}"></td>
                            <td th:text="${post.authorSurname}"></td>
                            <td th:text="${post.title}"></td>
                            <td th:text="${post.body}"></td>
                        </tr>
                    </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
