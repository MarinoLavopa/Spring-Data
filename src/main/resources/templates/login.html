<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">

     <!--/*  font awesome per il bottone vicino al titolo */-->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title th:text="${title}">Title</title>
</head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-12 my-4">  
                    <h1 class="text-center"> Accedi!</h1>
                    <h2 class="text-center">Inserisci username e password</h2>
                </div>
            </div>
        </div>

        <div th:if="${param.error}">
            Invalid username and password.
        </div>
        <div th:if="${param.logout}">
            You have been logged out.
        </div>

        <div class="container">
            <div class="row">
                <div class="col-12 col-md-9 col-lg-6 mx-auto">
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="usernameLogin" class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" id="usernameLogin">
                        </div>
                        <div class="mb-3">
                            <label for="passwordLogin" class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" id="passwordLogin">
                        </div>
                        <div class="d-flex justify-content-evenly">
                            <button type="submit" value="Log in" class="btn btn-primary">Log in</button>
                            <button type="reset" class="btn btn-secondary">Reset</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
        
    </body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
